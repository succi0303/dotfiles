# 新しいウィンドウのベース番号
set-option -g base-index 1

# すべてのベルを無視
set-option -g bell-action none

# 256色端末を使用する
set-option -g default-terminal "screen-256color"

# viのキーバインドを使用する
set-window-option -g mode-keys vi

# クリップボード共有
set-option -g default-command "~/.tmux/tmux-MacOSX-pasteboard/reattach-to-user-namespace -l $SHELL"
bind-key C-c run "tmux save-buffer - | ~/.tmux/tmux-MacOSX-pasteboard/reattach-to-user-namespace pbcopy"
bind-key C-v run "~/.tmux/tmux-MacOSX-pasteboard/reattach-to-user-namespace pbpaste | tmux load-buffer - && tmux paste-buffer"

# ステータスバー
set-option -g status-fg cyan
set-option -g status-bg black
set-option -g status-left-length 30
set-option -g status-left '#[fg=white,bg=black]#H#[fg=white]:#[fg=white][#S#[fg=white]][#[default]'
set-option -g status-right '#[fg=magenta,bg=black,bold] [%Y-%m-%d(%a) %H:%M]#[default]'
set-window-option -g window-status-current-fg cyan
set-window-option -g window-status-current-bg black
set-window-option -g window-status-current-attr bold#,underscore
